<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فيلوباتير أرنست | بروفايل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* متغيرات الوضع الليلي (الأساسي) - مع تحسين التباين */
            --bg-color: #0b0b0e;
            --card-bg: rgba(20, 20, 25, 0.7); /* خلفية زجاجية داكنة */
            --gold: #f8cc00;
            --gold-glow: rgba(248, 204, 0, 0.25); /* توهج ذهبي ناعم */
            --text-main: #ffffff;
            --text-gray: #aaaaaa;
            --gradient-1: rgba(248, 204, 0, 0.03);
            --gradient-2: rgba(11, 11, 14, 1);
        }

        .light-mode {
            --bg-color: #f0f0f5;
            --card-bg: rgba(255, 255, 255, 0.9);
            --gold: #d4a700;
            --gold-glow: rgba(212, 167, 0, 0.15);
            --text-main: #1a1a1a;
            --text-gray: #444444;
            --gradient-1: rgba(212, 167, 0, 0.08);
            --gradient-2: rgba(240, 240, 245, 1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
            transition: background 0.5s ease, color 0.5s ease, transform 0.3s ease, box-shadow 0.4s ease, border-color 0.4s ease;
        }

        body {
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px; color: var(--text-main);
            overflow: hidden;
        }

        /* --- تأثير الخلفية المتحرك (Mesh Gradient) --- */
        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: var(--gradient-2);
            background: radial-gradient(circle at 15% 25%, var(--gradient-1) 0%, transparent 45%),
                        radial-gradient(circle at 85% 75%, var(--gradient-1) 0%, transparent 45%);
            animation: pulseBg 12s infinite alternate;
        }

        @keyframes pulseBg {
            0% { transform: scale(1) translate(0, 0); }
            50% { transform: scale(1.05) translate(10px, -10px); }
            100% { transform: scale(1.1) translate(0, 0); }
        }

        /* --- زر تبديل الوضع (Mode Toggle) --- */
        .theme-switch {
            position: fixed; top: 20px; left: 20px;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.08);
            width: 50px; height: 50px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 20px; color: var(--gold);
            z-index: 100; backdrop-filter: blur(10px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* --- البطاقة الجذابة (الوضع الليلي) --- */
        .card {
            background: var(--card-bg);
            /* أهم تكة: Glassmorphism احترافي مع Blur عالي وشفافية متوازنة */
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px); /* لدعم سفاري */
            padding: 50px 40px;
            border-radius: 40px;
            text-align: center;
            width: 100%;
            max-width: 360px;
            
            /* تكة 2: إطار مضيء ناعم (Glow Border) */
            border: 1px solid rgba(255, 255, 255, 0.05);
            
            /* تكة 3: توهج ذهبي خارجي (Neon Glow Effect) */
            box-shadow: 0 25px 50px rgba(0,0,0,0.4), 
                        0 0 30px var(--gold-glow); /* هالة ذهبية ناعمة ثابتة */
            
            position: relative;
            transform-style: preserve-3d; /* لتحضير حركات الـ 3D المستقبلي */
        }

        /* تأثير جذاب عند مرور الماوس على البطاقة */
        .card:hover {
            transform: translateY(-10px) rotateX(2deg) rotateY(1deg); /* ميلان خفيف جداً */
            border-color: rgba(248, 204, 0, 0.2); /* الإطار يتوهج بالذهبي */
            box-shadow: 0 35px 70px rgba(0,0,0,0.5), 
                        0 0 50px var(--gold-glow); /* التوهج الذهبي يزيد */
        }

        /* إضافة لمسة فنية ناعمة داخل البطاقة */
        .card::before {
            content: "";
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border-radius: 35px;
            background: radial-gradient(circle at 50% 10%, rgba(255,255,255,0.02) 0%, transparent 60%);
            z-index: -1;
            pointer-events: none;
        }

        .profile-img-container {
            width: 140px; height: 140px;
            border-radius: 50%;
            margin: 0 auto 25px;
            border: 5px solid var(--gold);
            overflow: hidden;
            box-shadow: 0 0 25px rgba(248, 204, 0, 0.2);
            position: relative;
        }

        /* إضافة تأثير لمعان ناعم على الصورة */
        .profile-img-container::after {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shine 6s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        h1 { color: var(--gold); font-size: 28px; margin-bottom: 12px; font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        p { color: var(--text-gray); font-size: 16px; margin-bottom: 35px; line-height: 1.6; font-weight: 400; }

/* =========================================
   *** تم إصلاح وتظبيط جزء الأيقونات هنا ***
   ========================================= */
.social-links {
    display: flex;             /* رص العناصر جنب بعض في صف واحد */
    justify-content: center;   /* توسيط الأيقونات في نص البطاقة */
    align-items: center;       /* محاذاة رأسية مضبوطة */
    gap: 15px;                 /* مسافة ثابتة ومنظمة بين كل أيقونة والثانية */
    flex-wrap: nowrap;         /* منع الالتفاف (النزول تحت بعض) */
    margin-top: 30px;          /* مسافة علوية من النص */
    width: 100%;               /* استخدام كامل العرض */
}

/* التنسيق الأساسي لكل دائرة أيقونة */
.social-links a {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 50px;               /* حجم ثابت وموحد للكل */
    height: 50px;
    border-radius: 50%;        /* شكل دائري مثالي */
    text-decoration: none;     /* إزالة الخطوط */
    font-size: 22px;           /* تكبير حجم الأيقونة نفسها */
    color: var(--text-main);   /* اللون الافتراضي للأيقونة */
    background: rgba(128, 128, 128, 0.08); /* خلفية افتراضية خافتة */
    border: 1px solid rgba(255,255,255,0.03);
    transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* حركة أنيميشن ناعمة واحترافية */
}

/* حركة بسيطة لرفع الأيقونة لفوق عند الوقوف عليها */
.social-links a:hover {
    transform: translateY(-10px) scale(1.1);
}

/* --- ألوان محددة لكل منصة عند التمرير (الأسماء الطويلة) --- */

/* LinkedIn - أزرق براند */
.social-links a.linkedin:hover {
    background: #0077b5;
    color: white;
    box-shadow: 0 10px 20px rgba(0, 119, 181, 0.4);
    border-color: #0077b5;
}

/* Facebook - أزرق فيسبوك */
.social-links a.facebook:hover {
    background: #1877f2;
    color: white;
    box-shadow: 0 10px 20px rgba(24, 119, 242, 0.4);
    border-color: #1877f2;
}

/* WhatsApp - أخضر واتساب */
.social-links a.whatsapp:hover {
    background: #25d366;
    color: white;
    box-shadow: 0 10px 20px rgba(37, 211, 102, 0.4);
    border-color: #25d366;
}

/* Email - أحمر (Gmail) */
.social-links a.email:hover {
    background: #ea4335;
    color: white;
    box-shadow: 0 10px 20px rgba(234, 67, 53, 0.4);
    border-color: #ea4335;
}

        /* --- شاشات اللاب توب --- */
        @media (min-width: 1024px) {
            .card { max-width: 520px; padding: 70px; }
            .profile-img-container { width: 190px; height: 190px; border-width: 7px; }
            h1 { font-size: 44px; }
            p { font-size: 20px; }
            .social-links { gap: 22px; }
            
            /* تكبير الأيقونات لشاشات اللاب توب */
            .social-links a { 
                width: 65px; 
                height: 65px; 
                font-size: 28px; 
            }
        }
    </style>
</head>
<body class="dark-mode">

    <div class="bg-animate"></div>

    <div class="theme-switch" onclick="toggleTheme()">
        <i id="theme-icon" class="fas fa-moon"></i>
    </div>

    <div class="card">
        <div class="profile-img-container">
            <img src="WhatsApp Image 2026-03-27 at 3.39.12 PM.jpeg" alt="Philopater" style="width:100%; height:100%; object-fit:cover;">
        </div>
        
        <h1>فيلوباتير أرنست</h1>
        <p>Web Developer<br>Full Stack Developer</p>

        <div class="social-links">
            <a href="https://www.linkedin.com/in/فيلوباتير-ارنست-612027357?utm_source=share_via&utm_content=profile&utm_medium=member_android" class="linkedin" title="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
            <a href="https://www.facebook.com/share/1LuYXFNSLQ/" class="facebook" title="Facebook"><i class="fab fa-facebook-f"></i></a>
            <a href="tel:01278071535" class="whatsapp" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
            <a href="mailto:fylwbatyrarnst4@gmail.com" class="email" title="Email"><i class="fas fa-envelope"></i></a>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const html = document.getElementById('html-tag');
            const icon = document.getElementById('theme-icon');
            
            if (html.classList.contains('light-mode')) {
                html.classList.remove('light-mode');
                icon.classList.replace('fa-sun', 'fa-moon');
                localStorage.setItem('theme', 'dark');
            } else {
                html.classList.add('light-mode');
                icon.classList.replace('fa-moon', 'fa-sun');
                localStorage.setItem('theme', 'light');
            }
        }

        // حفظ الاختيار عند إعادة تحميل الصفحة
        window.onload = () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.getElementById('html-tag').classList.add('light-mode');
                document.getElementById('theme-icon').classList.replace('fa-moon', 'fa-sun');
            }
        }
    </script>
</body>
</html>
